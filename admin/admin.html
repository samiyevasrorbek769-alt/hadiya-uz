<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Al-Harameen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-container">
        <header class="admin-header">
            <div class="header-left">
                <i class="fas fa-user-shield"></i>
                <h2>Boshqaruv Paneli</h2>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
        </header>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="openTab(event, 'products-tab')">Mahsulotlar</button>
            <button class="tab-btn" onclick="openTab(event, 'hero-tab')">Asosiy Banner (Home)</button>
            <button class="tab-btn" onclick="openTab(event, 'reviews-tab')">Video Sharhlar</button>
            <button class="tab-btn" onclick="openTab(event, 'orders-tab')" id="orders-tab-btn">
                Buyurtmalar <span id="new-orders-count" style="display: none;">0</span>
            </button>
        </div>

        <div id="products-tab" class="tab-content active">
            <div class="admin-card">
                <h3 id="form-title"><i class="fas fa-plus-circle"></i> Yangi mahsulot qo'shish</h3>
                <div class="admin-form">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <input type="text" id="pName" placeholder="Mahsulot nomi" required>
                    </div>
                    <div class="form-row">
                        <input type="number" id="pPrice" placeholder="Narxi (UZS)" required>
                        <select id="pCategory">
                            <option value="Erkaklar soati">Hammasi</option>
                            <option value="Erkaklar soati">Erkaklar soati</option>
                            <option value="Ayollar soati">Ayollar soati</option>
                            <option value="Byudjet">Byudjet</option>
                            <option value="Premium">Premium</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="file-label">
                            <i class="fas fa-cloud-upload-alt"></i> Rasmlarni tanlang
                            <input type="file" id="pImgFiles" accept="image/*" multiple
                                onchange="previewImages('image-preview', 'pImgFiles')">
                        </label>
                        <div id="image-preview" class="preview-box"></div>
                    </div>
                    <textarea id="pDesc" placeholder="Mahsulot haqida batafsil ma'lumot..." rows="4"></textarea>
                    <button class="add-btn" id="uploadBtn" onclick="saveProduct()">
                        <i class="fas fa-save"></i> MAHSULOTNI SAQLASH
                    </button>
                </div>
            </div>
            <div class="list-section">
                <h3>Mavjud mahsulotlar (<span id="pCount">0</span>)</h3>
                <div id="admin-product-list" class="admin-grid"></div>
            </div>
        </div>

        <div id="hero-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-mobile-alt"></i> Mobil Banner Sozlamalari</h3>
                <div class="admin-form">
                    <div class="form-row">
                        <input type="text" id="hName" placeholder="Model nomi (Maks: 15 belgi)" maxlength="15">

                        <input type="number" id="hPrice" placeholder="Narxi (UZS)">
                    </div>

                    <div class="form-group">
                        <label class="file-label">
                            <i class="fas fa-camera"></i> Banner rasmini tanlang
                            <input type="file" id="hImgFile" accept="image/*" multiple
                                onchange="previewImages('hero-preview', 'hImgFile')">
                        </label>
                        <div id="hero-preview" class="preview-box"></div>
                    </div>

                    <textarea id="hDesc" placeholder="Batafsil sahifa uchun ma'lumot yozing..."></textarea>

                    <button class="add-btn" onclick="saveHeroBanner()">
                        <i class="fas fa-sync-alt"></i> MOBIL BANNERNI YANGILASH
                    </button>
                </div>
            </div>
        </div>

        <div id="reviews-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-video"></i> Video sharh qo'shish</h3>
                <div class="admin-form">
                    <input type="text" id="vTitle" placeholder="Video sarlavhasi">
                    <input type="text" id="vUrl" placeholder="YouTube Link (masalan: https://youtu.be/...)">
                    <button class="add-btn" onclick="saveReview()">VIDEO QO'SHISH</button>
                </div>
            </div>
            <div id="admin-review-list" class="admin-grid"></div>
        </div>

        <div id="orders-tab" class="tab-content">
            <div class="table-responsive">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Sana</th>
                            <th>Mijoz</th>
                            <th>Mahsulot</th>
                            <th>Jami</th>
                            <th>Status</th>
                            <th>Amal</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Iltimos, kuting...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>

</html>
