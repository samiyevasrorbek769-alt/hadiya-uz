<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Al-Harameen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-container">
        <header class="admin-header">
            <div class="header-left">
                <i class="fas fa-user-shield"></i>
                <h2>Boshqaruv Paneli</h2>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
        </header>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="openTab(event, 'products-tab')">Mahsulotlar</button>
            <button class="tab-btn" onclick="openTab(event, 'reviews-tab')">Video Sharhlar</button>
            <button class="tab-btn" onclick="openTab(event, 'orders-tab')" id="orders-tab-btn">
                Buyurtmalar <span id="new-orders-count"
                    style="background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none;">0</span>
            </button>
        </div>

        <div id="products-tab" class="tab-content active">
            <div class="admin-card">
                <h3 id="form-title"><i class="fas fa-plus-circle"></i> Yangi mahsulot qo'shish</h3>
                <div class="admin-form">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <input type="text" id="pName" placeholder="Mahsulot nomi (masalan: Al-Harameen HA-6314)"
                            required>
                    </div>
                    <div class="form-row">
                        <input type="number" id="pPrice" placeholder="Narxi (UZS)" required>
                        <select id="pCategory">
                            <option value="Erkaklar soati">Hammasi</option>
                            <option value="Erkaklar soati">Erkaklar soati</option>
                            <option value="Ayollar soati">Ayollar soati</option>
                            <option value="Byudjet">Byudjet</option>
                            <option value="Premium">Premium</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="file-label">
                            <i class="fas fa-cloud-upload-alt"></i> Rasmlarni tanlang (Bir nechta)
                            <input type="file" id="pImgFiles" accept="image/*" multiple onchange="previewImages()">
                        </label>
                        <div id="image-preview" class="preview-box"></div>
                    </div>
                    <textarea id="pDesc" placeholder="Mahsulot haqida batafsil ma'lumot..." rows="4"></textarea>

                    <div style="display: flex; gap: 10px;">
                        <button class="add-btn" id="uploadBtn" onclick="saveProduct()" style="flex: 2;">
                            <i class="fas fa-save"></i> MAHSULOTNI SAQLASH
                        </button>
                        <button id="cancelEditBtn" onclick="resetForm()"
                            style="display:none; flex: 1; background: #444; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                            BEKOR QILISH
                        </button>
                    </div>
                </div>
            </div>

            <div class="filter-section" style="margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="tab-btn active" onclick="loadProducts()">Hammasi</button>
                <button class="tab-btn" onclick="filterByCategory('Erkaklar soati', this)">Erkaklar</button>
                <button class="tab-btn" onclick="filterByCategory('Ayollar soati', this)">Ayollar</button>
                <button class="tab-btn" onclick="filterByCategory('Byudjet', this)">Byudjet</button>
                <button class="tab-btn" onclick="filterByCategory('Premium', this)">Premium</button>
            </div>

            <div class="list-section">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInp" placeholder="Mahsulotlarni qidirish..."
                        oninput="filterProducts()">
                </div>
                <h3>Mavjud mahsulotlar (<span id="pCount">0</span>)</h3>
                <div id="admin-product-list" class="admin-grid">
                </div>
            </div>
        </div>

        <div id="reviews-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-video"></i> Yangi video sharh qo'shish</h3>
                <div class="admin-form">
                    <input type="text" id="vTitle" placeholder="Video sarlavhasi (Mijozimiz fikri)">
                    <input type="text" id="vUrl" placeholder="YouTube Video Link (https://youtu.be/...)">
                    <button class="add-btn" onclick="saveReview()">
                        <i class="fas fa-check"></i> SHARHNI QO'SHISH
                    </button>
                </div>
            </div>

            <div class="list-section">
                <h3>Barcha videolar</h3>
                <div id="admin-review-list" class="admin-grid"></div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Iltimos, kuting...</p>
    </div>
    <div id="orders-tab" class="tab-content">
        <div class="list-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3><i class="fas fa-shopping-cart"></i> Kelib tushgan buyurtmalar</h3>
                <button onclick="fetchOrders()" class="add-btn" style="width: auto; padding: 10px 20px;">
                    <i class="fas fa-sync-alt"></i> Yangilash
                </button>
            </div>

            <div class="table-responsive">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Sana</th>
                            <th>Mijoz</th>
                            <th>Mahsulotlar</th>
                            <th>Jami</th>
                            <th>Status</th>
                            <th>Amal</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>

</html>
